font_family      PragmataPro Mono Liga Regular
bold_font        PragmataPro Mono Liga Bold
italic_font      PragmataPro Mono Liga Italic
bold_italic_font PragmataPro Mono Liga Bold Italic

font_features PragmataProMonoLigaRegular +calt -cv01 +ss02 +ss11
font_features PragmataProMonoLigaItalic +calt -cv01 +ss02 +ss11
font_features PragmataProMonoLigaBold +calt -cv01 +ss02 +ss11
font_features PragmataProMonoLigaBoldItalic +calt -cv01 +ss02 +ss11

font_size 9.0
box_drawing_scale 0.001, 0.5, 0.5, 0.5
adjust_line_height 10
adjust_column_width 0
disable_ligatures never
background_opacity 1.0
draw_minimal_borders yes
window_padding_width 0
cursor_shape block
repaint_delay 0
input_delay 0

cursor                #b3b3b3
cursor_text_color     #121212
foreground            #b3b3b3
background            #121212
color0                #121212
color8                #2b2b2b
color1                #cc2846
color9                #cc2846
color2                #76af5f
color10               #76af5f
color3                #f6b655
color11               #f6b655
color4                #0f7fcf
color12               #0f7fcf
color5                #ae6698
color13               #ae6698
color6                #42a7cf
color14               #42a7cf
color7                #b3b3b3
color15               #1a1a1a

hide_window_decorations yes
env COLORSCHEME=Molokai
